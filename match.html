<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقرير التوافق | منقية</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="match-page">

<header>تقرير التوافق</header>

<div class="container">

    <div class="match-section">
        <h2>مؤشر التوافق مع الوظيفة</h2>
        <div class="match-bar-container">
            <div class="match-bar" id="matchBar"></div>
        </div>
        <div class="percentage-label" id="percentageLabel">نسبة التوافق: --%</div>
    </div>

    <div class="gap-section">
        <h3>تقرير الفجوات</h3>
        <ul class="gap-list" id="gapList"></ul>
    </div>

    <div class="recommend-section">
        <h3>التوصيات لمعسكرات تدريبية</h3>
        <ul class="recommend-list" id="recList"></ul>
    </div>

    <button class="final-apply-btn" id="finalApplyBtn" onclick="finalApply()">تقديم نهائي</button>

</div>

<script src="script.js"></script>
</body>
</html>
